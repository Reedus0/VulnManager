<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Vuln Queue Manager</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .box {
            width: 400px;
        }

        input,
        button {
            padding: 8px;
            margin-top: 5px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <h2>Vulnerability Queue Manager</h2>

    <div class="container">

        <!-- LEFT: ADD -->
        <div class="box">
            <h3>Add vulnerability</h3>

            <input id="idInput" placeholder="CVE or BDU">

            <br>

            <button onclick="add()">Add to queue</button>
        </div>

        <!-- RIGHT: QUEUE -->
        <div class="box">
            <h3>Queue</h3>
            <div id="queue"></div>
        </div>

    </div>

    <script>

        async function loadQueue() {
            const res = await fetch("/queue");
            const data = await res.json();

            let html = "";

            data.forEach(item => {
                html += `
        <div class="item">
            <span>${item}</span>
            <button onclick="removeItem('${item}')">X</button>
        </div>
        `;
            });

            document.getElementById("queue").innerHTML = html;
        }

        async function add() {
            const id = document.getElementById("idInput").value;

            const form = new FormData();
            form.append("identifier", id);

            await fetch("/queue/add", {
                method: "POST",
                body: form
            });

            document.getElementById("idInput").value = "";
            loadQueue();
        }

        async function removeItem(id) {
            const form = new FormData();
            form.append("identifier", id);

            await fetch("/queue/remove", {
                method: "POST",
                body: form
            });

            loadQueue();
        }

        loadQueue();

    </script>

</body>

</html>
