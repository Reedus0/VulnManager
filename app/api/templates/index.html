<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Vuln Queue Manager</title>

    <style>
        body {
            font-family: Inter, system-ui, Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #e2e8f0;
        }

        h2 {
            margin: 0;
            padding: 20px 30px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px 30px;
            flex-wrap: wrap;
        }

        .box {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 14px;
            padding: 18px;
            width: 360px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h3 {
            margin-top: 0;
            font-size: 16px;
            color: #93c5fd;
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0b1220;
            color: #e2e8f0;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
        }

        button {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-top: 8px;
            border-radius: 10px;
            background: #0b1220;
            border: 1px solid #1f2937;
            transition: 0.2s;
        }

        .item:hover {
            border-color: #334155;
            transform: translateY(-1px);
        }

        .item span {
            font-size: 13px;
            color: #cbd5e1;
            word-break: break-all;
        }

        .danger {
            background: #ef4444;
            padding: 6px 10px;
            font-size: 12px;
        }

        .danger:hover {
            background: #dc2626;
        }

        .download-btn {
            background: #10b981;
            padding: 6px 10px;
            font-size: 12px;
        }

        .download-btn:hover {
            background: #059669;
        }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <h2>🛡 Vulnerability Queue Manager</h2>

    <div class="container">

        <!-- ADD -->
        <div class="box">
            <h3>Add vulnerability</h3>
            <input id="idInput" placeholder="CVE or BDU">
            <button onclick="add()">Add to queue</button>
        </div>

        <!-- OUTPUT FILES -->
        <div class="box">
            <h3>Output files</h3>
            <button onclick="loadFiles()">Refresh</button>
            <div id="files"></div>
        </div>

        <!-- QUEUE -->
        <div class="box">
            <h3>Queue</h3>
            <div id="queue"></div>
        </div>

    </div>

    <script>

        async function loadFiles() {
            const res = await fetch("/output/files");
            const data = await res.json();

            let html = "";

            data.files.forEach(file => {
                html += `
                <div class="item">
                    <span>${file.name} (${file.size} bytes)</span>
                    <a href="/output/download/${file.name}">
                        <button class="download-btn">Download</button>
                    </a>
                </div>
                `;
            });

            document.getElementById("files").innerHTML = html;
        }

        async function loadQueue() {
            const res = await fetch("/queue");
            const data = await res.json();

            let html = "";

            data.forEach(item => {
                html += `
                <div class="item">
                    <span>${item}</span>
                    <button class="danger" onclick="removeItem('${item}')">X</button>
                </div>
                `;
            });

            document.getElementById("queue").innerHTML = html;
        }

        async function add() {
            const id = document.getElementById("idInput").value;

            const form = new FormData();
            form.append("identifier", id);

            await fetch("/queue/add", {
                method: "POST",
                body: form
            });

            document.getElementById("idInput").value = "";
            loadQueue();
        }

        async function removeItem(id) {
            const form = new FormData();
            form.append("identifier", id);

            await fetch("/queue/remove", {
                method: "POST",
                body: form
            });

            loadQueue();
        }

        loadQueue();
        loadFiles();

    </script>

</body>

</html>
